<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>

        </title>
        <style>
            body
            {
            
                margin: 0%;
                padding:0;
                font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            }

            
            .exa{
                background-color:navy;
                flex-direction: column;
                align-items: center;
                display: flex;
                justify-content: center;

            }
            .full{
                 display: grid;
            grid-template-areas:
            "header header"
            "menu content"
            "footer footer";
            grid-template-columns:1fr;
           
            }
            .eee{
                color: antiquewhite;
                background-color:rgb(28, 151, 100);
                text-align: center;
                padding:10px;
                
                border-radius: 9px;
                margin: 10px;
                
            }
           
            .fff{
                grid-area: menu;
                background-color: rgb(8, 24, 248);
                padding: 20px;
                margin:5px;
                width: auto;
            }
            .hhhh{
                background-color: aliceblue;
                padding: 10px;
                margin-bottom: 10px;
                border-radius: 5px;
                
            }
            .rr{
                grid-area: content;
                padding: 10px;
                background-color: NAVY;
                text-align: center;
                margin: 20px;
               
            }
            .footer
            {
             grid-area: footer;
            background-color: gray;
            color:white;
            text-align: center;
            padding: 20px;
            }
            .header{
                grid-area: header;
                background-color: navy;
                color: aliceblue;
                text-align: center;
                padding: 10px;
            }
            @media(min-width:600px)
            {
                .full{
                    grid-template-columns: 200px 1fr;
                }
                .exa{
                flex-direction: row;
                justify-content: center;
            }}
            
            /*TAB VIEW*/
            @media(min-width:768px)
            {
                .full{
                    grid-template-columns: 1fr 1fr;
                }
                .exa{
                flex-direction: row;
                justify-content: center;
            }}
            @media(min-width:1024)
            {
                .full{
                    grid-template-columns: 1fr 1fr 1fr;
                }
            }
        </style>
    </head>
    <body>
                <div class="full">
                 <div class="header">
        <h1>MY PROFILE</h1>
        
        
        <nav class="exa">
            <div class="eee">HOME</div>
            <div class="eee">ABOUT</div>
            <div class="eee">SKILLS</div>
            <div class="eee">CONTACT</div>
        </nav>
        </div>
        <div class="fFf">
            

            <div class="hhhh">HOME</div>
            <div class="hhhh">ABOUT</div>
            <div class="hhhh">SKILLS</div>
            <div class="hhhh">CONTACT</div>
        </div>  
        <div class="rr" >
            <h2>welcome</h2>
            <P>THIS IS MY PROFILE PAGE</P>         
        
            </div>
      <div class="footer"> 
          
                @2026 my profile
        </div>
      </div>
    </body>
    </html>
