<!DOCTYPE html>
<html>
<head>
    <title>CSS Transition</title>

<style>
body{
    background: #f0f0f0;
    font-family: Arial, sans-serif;
}

.card{
    width: 350px;
    margin: 50px auto;
    padding: 20px;
    background: white;
    text-align: center;
    border: 2px solid black;
}

h1{
    font-family: Georgia;
    font-size: 32px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 4px;
    line-height: 70px;
}

h2{
    font-size: 24px;
    font-style: italic;
    font-weight: bold;
}

h3{
    font-size: 20px;
    font-weight: normal;
    text-transform: capitalize;
}

p{
    font-size: 16px;
    line-height: 30px;
    letter-spacing: 1px;
    text-align: justify;
}

button{
    padding:10px 10px;
    font-size: 16px;
    font-weight: bold;
}
</style>
</head>
<body>

<div class="card">
    <h1>Student Profile</h1>

    <h2>Mukil M</h2>

    <h3>B.Sc Computer Science</h3>

    <p>
        I am a passionate student interested in web development and programming.
    </p>

    <button>View Profile</button>
</div>

</body>
</html>
